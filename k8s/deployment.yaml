apiVersion: apps/v1
kind: Deployment
metadata:
  name: stocks-app
  labels:
    app: stocks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stocks-app
  template:
    metadata:
      labels:
        app: stocks-app
    spec:
      containers:
        - name: stocks-app
          image: <YOUR_ECR_URI>/stocks-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stocks-secret
                  key: secret-key
            - name: ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_DEBUG
              value: "False"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
